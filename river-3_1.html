<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Wish I Was A River — Mairéad McClean</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --black: #000000;
    --white: #ffffff;
    --off-white: #e8e4dc;
    --dim: #888880;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'IM Fell English', Georgia, serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 0 24px 60px;
  }

  .header {
    width: 100%;
    max-width: 640px;
    text-align: center;
    padding-top: 64px;
    padding-bottom: 40px;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards;
    animation-delay: 0.2s;
  }

  .edition-line {
    font-size: 9px;
    letter-spacing: 0.35em;
    color: var(--dim);
    text-transform: uppercase;
    font-style: normal;
    font-family: Georgia, serif;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .edition-line .x {
    color: rgba(255,255,255,0.35);
    font-size: 11px;
  }

  .divider {
    width: 1px;
    height: 32px;
    background: rgba(255,255,255,0.15);
    margin: 0 auto 32px;
  }

  .artist-name {
    font-size: clamp(10px, 2.5vw, 13px);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--off-white);
    font-style: normal;
    font-family: Georgia, serif;
    margin-bottom: 18px;
  }

  .work-title {
    font-size: clamp(22px, 6vw, 36px);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--white);
    font-style: italic;
    line-height: 1.2;
  }

  .divider-bottom {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 32px auto 0;
  }

  .video-container {
    width: 100%;
    max-width: 640px;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards;
    animation-delay: 0.7s;
  }

  .vimeo-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 100%;
    background: #000000;
    overflow: hidden;
  }

  .vimeo-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: #000000;
  }

  .caption {
    width: 100%;
    max-width: 640px;
    text-align: center;
    margin-top: 28px;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards;
    animation-delay: 1.1s;
  }

  .caption p {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--dim);
    font-family: Georgia, serif;
    line-height: 2;
  }

  .caption .year {
    color: rgba(255,255,255,0.3);
  }

  .footer {
    margin-top: 56px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 1.4s;
  }

  .footer-logo {
    font-size: 8px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    font-family: Georgia, serif;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>
<body>

  <div class="header">
    <div class="edition-line">
      <span>The Bodrum Edition</span>
      <span class="x">×</span>
      <span>Vision</span>
    </div>
    <div class="divider"></div>
    <div class="artist-name">Mairéad McClean</div>
    <div class="work-title">I Wish I Was A River</div>
    <div class="divider-bottom"></div>
  </div>

  <div class="video-container">
    <div class="vimeo-wrap">
      <iframe
        src="https://player.vimeo.com/video/1198710032?h=b399b4717b&autoplay=1&loop=1&title=0&byline=0&portrait=0&muted=0&color=ffffff"
        allow="autoplay; fullscreen; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <div class="caption">
    <p>Two-channel video installation &nbsp;·&nbsp; <span class="year">2024</span></p>
    <p>Archival pigment print on plexiglass</p>
    <p>Courtesy of the Artist</p>
  </div>

  <div class="footer">
    <div class="footer-logo">The Bodrum Edition</div>
  </div>

</body>
</html>
